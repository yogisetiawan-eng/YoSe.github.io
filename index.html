<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap');
  :root {
    --bg: #FFF8EC;
    --ink: #2B2620;
    --ink-soft: #7A7367;
    --surface: #FFFFFF;

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--ink); -webkit-tap-highlight-color: transparent; }
  #app { max-width: 460px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; display:flex; flex-direction:column; }

  /* ---------- HOME (sticker book) ---------- */
  .home-header {
    background: linear-gradient(160deg, #3A7D44, #2E6B3A);
    color: white;
    padding: 22px 20px 60px;
    border-radius: 0 0 32px 32px;
    text-align: center;
  }
  .home-header h1 { margin: 0 0 4px; font-size: 26px; font-weight: 800; }
  .home-header p { margin: 0; font-size: 14.5px; opacity: 0.92; }
  .mascot-hero { font-size: 54px; margin-bottom: 6px; }

  .sticker-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 0 16px;
    margin-top: -42px;
  }
  .sticker-card {
    background: var(--surface);
    border-radius: 22px;
    box-shadow: var(--shadow);
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    border: 3px solid transparent;
    transition: transform .08s ease;
  }
  .sticker-card:active { transform: scale(0.96); }
  .sticker-card.done { border-color: #FFC94A; }
  .sticker-card.bonus-card { background: linear-gradient(160deg, #FFF3CD, #FFE082); border-color: #FFC94A; }
  .sticker-card.bonus-card.locked { background: #EFEBE2; opacity: 0.75; cursor: default; }
  .sticker-emoji { font-size: 40px; display:block; margin-bottom: 6px; }
  .sticker-card h3 { font-size: 14.5px; margin: 0 0 2px; font-weight: 700; line-height:1.25; }
  .sticker-card .lock { font-size: 11.5px; color: var(--ink-soft); font-weight: 700; }
  .sticker-card .earned { font-size: 11.5px; color: #B8860B; font-weight: 800; }

  .help-banner {
    margin: 18px 16px 8px;
    background: #E3F2FD;
    border-radius: 18px;
    padding: 14px 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .help-banner .icon { font-size: 26px; }
  .help-banner strong { display:block; font-size: 14.5px; margin-bottom: 2px; }
  .help-banner p { margin:0; font-size: 13px; color: var(--ink-soft); }
  .help-banner a { color: #1565C0; font-weight: 800; text-decoration: none; }

  .progress-line { text-align:center; margin: 14px 0 4px; font-weight: 800; color:#3A7D44; font-size: 14px; }

  /* ---------- STORY / CHAT SCREEN ---------- */
  .story-header {
    position: sticky; top:0; z-index:5;
    display:flex; align-items:center; gap:10px;
    padding: 14px 16px;
    color: white;
    box-shadow: var(--shadow);
  }
  .story-header button.back {
    background: rgba(255,255,255,0.22); border:none; color:white;
    width:34px; height:34px; border-radius:10px; font-size:18px; cursor:pointer;
  }
  .story-header .title { font-weight: 800; font-size: 16px; }
  .story-header .sub { font-size: 11.5px; opacity: 0.9; }

  .chat-log {
    flex: 1;
    padding: 16px 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow-y: auto;
  }
  .bubble-row { display:flex; gap:8px; align-items:flex-end; max-width: 90%; animation: pop .25s ease; }
  @keyframes pop { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform:none; } }
  .bubble-row.them { align-self:flex-start; }
  .bubble-row.me { align-self:flex-end; flex-direction: row-reverse; }
  .avatar { font-size: 22px; flex-shrink:0; }
  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.4;
    box-shadow: var(--shadow);
  }
  .bubble-row.them .bubble { background: var(--surface); border-bottom-left-radius: 4px; }
  .bubble-row.me .bubble { background: #DCF8C6; border-bottom-right-radius: 4px; }
  .bubble-row.guide .bubble { background: #FFF3CD; border: 2px dashed #FFC94A; font-weight: 600; }
  .bubble-row.guide .avatar { font-size: 26px; }

  .typing-dots { display:inline-flex; gap:4px; padding: 6px 4px; }
  .typing-dots span { width:6px; height:6px; border-radius:50%; background:#B0B0B0; animation: blink 1s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100% { opacity:.25; } 40% { opacity:1; } }

  .choice-panel {
    padding: 12px 14px 20px;
    background: linear-gradient(0deg, var(--bg) 60%, transparent);
    position: sticky; bottom: 0;
  }
  .choice-hint { font-size: 12.5px; color: var(--ink-soft); font-weight:700; margin-bottom:8px; text-align:center; }
  .choice-btn {
    display:flex; align-items:center; gap:10px;
    width:100%; text-align:left;
    background: var(--surface);
    border: 2px solid #E5DFD3;
    border-radius: 16px;
    padding: 13px 16px;
    font-size: 15.5px;
    font-weight: 700;
    font-family: inherit;
    margin-bottom: 9px;
    cursor: pointer;
    box-shadow: var(--shadow);
  }
  .choice-btn:active { transform: scale(0.98); }
  .choice-btn .emo { font-size: 20px; }

  .continue-btn {
    display:block; width: calc(100% - 28px); margin: 0 14px 16px;
    background: #3A7D44; color:white; border:none; border-radius:16px;
    padding: 14px; font-size:16px; font-weight:800; font-family:inherit; cursor:pointer;
  }

  /* ---------- END CARD ---------- */
  .end-wrap { padding: 40px 22px; text-align:center; }
  .end-sticker { font-size: 70px; margin-bottom: 10px; }
  .end-title { font-size: 23px; font-weight:800; margin-bottom: 10px; }
  .end-recap {
    background: var(--surface); border-radius: 18px; padding: 16px;
    font-size: 15px; line-height:1.5; box-shadow: var(--shadow); margin-bottom: 22px;
  }
  .end-btn {
    display:block; width:100%; padding:15px; border-radius:16px; border:none;
    font-size:16px; font-weight:800; font-family:inherit; cursor:pointer;
    background:#3A7D44; color:white; margin-bottom:10px;
  }

  /* ---------- FINAL CELEBRATION ---------- */
  .confetti { font-size: 30px; }
</style>

        recap: "Kalau kamu atau temanmu butuh bantuan, cerita ke Ayah/Ibu/Guru, atau telepon SAPA 129 (nomor 129). Kalau orang pertama belum bisa bantu, coba orang dewasa lain — jangan menyerah. Kamu berhak merasa aman!" }
    ]
  }
];

/* ======================= BONUS: TANTANGAN KILAT ======================= */
/* A short, replayable rapid-fire round unlocked after all 5 stories are done.
   Each round samples a shuffled subset of this pool, so it plays differently every time. */
const BONUS_POOL = [
  { text: "Teman online minta nomor HP-mu. Boleh dikasih?", yes: false, tip: "Jangan ya, nomor HP itu data pribadi yang harus dijaga." },
  { text: "Orang tuamu minta lihat isi chat-mu. Boleh diizinkan?", yes: true, tip: "Boleh banget! Orang tua boleh tahu supaya bisa melindungimu." },
  { text: "Ada yang minta kamu kirim foto sedang pegang KTP/kartu pelajar ke orang asing online. Boleh?", yes: false, tip: "Jangan! Itu data pribadi yang bisa disalahgunakan." },
  { text: "Kamu dapat pesan 'Selamat! Kamu menang HP gratis, klik link ini'. Boleh diklik?", yes: false, tip: "Jangan diklik! Itu biasanya penipuan (phishing)." },
  { text: "Temanmu diejek terus di grup kelas. Kamu ajak dia cerita ke guru. Ini langkah yang tepat?", yes: true, tip: "Betul, mengajak teman cerita bareng itu tindakan berani dan baik." },
  { text: "Orang yang baru kamu kenal di game minta ketemuan berdua saja tanpa orang tua tahu. Boleh?", yes: false, tip: "Jangan pernah mau ketemuan sendirian dengan orang yang hanya kamu kenal online." },
  { text: "Kamu merasa nggak nyaman dengan chat seseorang. Boleh cerita ke Ayah/Ibu?", yes: true, tip: "Boleh, malah harus! Cerita ke orang dewasa yang kamu percaya itu langkah tepat." },
  { text: "Kata sandi akun game-mu diminta oleh 'admin palsu' yang janji naikkan level. Boleh dikasih?", yes: false, tip: "Jangan! Admin asli tidak pernah minta kata sandimu." },
  { text: "Kamu boleh menolak permintaan pertemanan dari orang yang tidak dikenal di dunia nyata. Setuju?", yes: true, tip: "Setuju banget, itu hakmu sepenuhnya." },
  { text: "Nomor darurat SAPA 129 bisa dihubungi kalau kamu atau temanmu butuh bantuan. Betul?", yes: true, tip: "Betul! Simpan nomor itu ya." },
  { text: "Seseorang minta kamu kirim video dirimu sendirian dan menjanjikan hadiah. Boleh?", yes: false, tip: "Jangan sama sekali! Ini termasuk tanda bahaya, langsung cerita ke orang tua." },
  { text: "Sebelum unggah foto ke medsos, sebaiknya kamu pikir dulu apa isinya aman dibagikan. Setuju?", yes: true, tip: "Setuju, karena sekali diunggah, sulit dihapus sepenuhnya dari internet." }
];

function shuffledBonusRound(count) {
  const pool = [...BONUS_POOL];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, Math.min(count, pool.length));
}

/* ======================= STORAGE ======================= */
const STORAGE_KEY = "sahabatanak_progress_v2";
function loadProgress() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : { completed: {}, bestStreak: 0 }; }
  catch (e) { return { completed: {}, bestStreak: 0 }; }
}
function saveProgress(p) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); } catch (e) {} }
let progress = loadProgress();
if (typeof progress.bestStreak !== "number") progress.bestStreak = 0;

/* ======================= APP STATE ======================= */
const app = document.getElementById("app");
let route = { screen: "home" };
let session = null; // { storyId, beatIndex, log:[{from,name,avatar,text,style}], waiting:'choice'|null, options:[] }
let bonus = null; // { questions, index, streak, waiting, current }

function render() {
  if (route.screen === "home") renderHome();
  else if (route.screen === "story") renderStory();
  else if (route.screen === "bonus") renderBonus();
  window.scrollTo(0,0);
}

/* ---------- HOME ---------- */
function renderHome() {
  const doneCount = STORIES.filter(s => progress.completed[s.id]).length;
  const allDone = doneCount === STORIES.length;
  const cards = STORIES.map(s => {
    const done = !!progress.completed[s.id];
    return `
      <div class="sticker-card ${done ? 'done' : ''}" onclick="__openStory('${s.id}')">
        <span class="sticker-emoji">${s.emoji}</span>
        <h3>${s.title}</h3>
        <div class="${done ? 'earned' : 'lock'}">${done ? '⭐ Selesai' : 'Yuk mulai'}</div>
      </div>`;
  }).join("");

  const bonusCard = allDone ? `
      <div class="sticker-card bonus-card" onclick="__openBonus()">
        <span class="sticker-emoji">⚡</span>
        <h3>Tantangan Kilat</h3>
        <div class="earned">Rekor: ${progress.bestStreak || 0} benar berturut-turut</div>
      </div>` : `
      <div class="sticker-card bonus-card locked">
        <span class="sticker-emoji">🔒</span>
        <h3>Tantangan Kilat</h3>
        <div class="lock">Selesaikan 5 cerita dulu</div>
      </div>`;

  app.innerHTML = `
    <div class="home-header">
      <div class="mascot-hero">🦉</div>
      <h1>Halo, Sahabat!</h1>
      <p>Yuk main petualangan seru sambil belajar aman di internet</p>
    </div>
    <div class="sticker-grid">${cards}${bonusCard}</div>
    <div class="progress-line">🌟 ${doneCount} dari ${STORIES.length} stiker terkumpul</div>
    ${allDone ? `<div class="progress-line" style="color:#B8860B">🏆 Semua stiker terkumpul! Tantangan Kilat sudah terbuka!</div>` : ""}
    <div class="help-banner">
      <div class="icon">☎️</div>
      <div>
        <strong>Butuh bantuan sekarang?</strong>
        <p>Telpon <a href="tel:129">129</a> atau WhatsApp <a href="https://wa.me/6281111129129" target="_blank" rel="noopener">08111-129-129</a> (SAPA 129)</p>
      </div>
    </div>
  `;
}
window.__openStory = function (storyId) {
  session = { storyId, beatIndex: 0, log: [], waiting: null, options: [] };
  route = { screen: "story" };
  render();
  playForward();
};

/* ---------- STORY / CHAT ---------- */
function currentStory() { return STORIES.find(s => s.id === session.storyId); }

function renderStory() {
  const story = currentStory();
  const rows = session.log.map(m => bubbleHtml(m)).join("");

  let bottomHtml = "";
  if (session.waiting === "choice") {
    const opts = session.options.map((o, i) => `
      <button class="choice-btn" onclick="__pickOption(${i})">
        <span class="emo">${o.emo}</span><span>${o.label}</span>
      </button>`).join("");
    bottomHtml = `<div class="choice-panel"><div class="choice-hint">${session.hint || 'Pilih balasanmu'}</div>${opts}</div>`;
  } else if (session.waiting === "end") {
    const b = session.endBeat;
    bottomHtml = `
      <div class="end-wrap">
        <div class="end-sticker">${b.sticker}</div>
        <div class="end-title">${b.title}</div>
        <div class="end-recap">${b.recap}</div>
        <button class="end-btn" onclick="__goHome()">Kembali ke Rumah Stiker</button>
      </div>`;
  }

  app.innerHTML = `
    <div class="story-header" style="background:${story.color}">
      <button class="back" onclick="__goHome()">←</button>
      <div>
        <div class="title">${story.emoji} ${story.title}</div>
        <div class="sub">${story.sub}</div>
      </div>
    </div>
    <div class="chat-log" id="chatLog">${rows}</div>
    ${bottomHtml}
  `;
  const logEl = document.getElementById("chatLog");
  if (logEl) logEl.scrollTop = logEl.scrollHeight;
}

function bubbleHtml(m) {
  if (m.style === "guide") {
    return `<div class="bubble-row guide"><span class="avatar">🦉</span><div class="bubble">${m.text}</div></div>`;
  }
  if (m.style === "me") {
    return `<div class="bubble-row me"><span class="avatar">🧒</span><div class="bubble">${m.text}</div></div>`;
  }
  // them / group
  return `<div class="bubble-row them"><span class="avatar">${m.avatar || "🧑"}</span><div class="bubble">${m.text}</div></div>`;
}

function pushMsg(style, text, avatar) {
  session.log.push({ style, text, avatar });
}

async function playForward() {
  const story = currentStory();
  while (session.beatIndex < story.beats.length) {
    const beat = story.beats[session.beatIndex];
    if (beat.type === "msg") {
      const avatar = beat.from === "them" ? (beat.avatar || story.themAvatar) : (beat.avatar || null);
      pushMsg(beat.from === "guide" ? "guide" : "them", beat.text, avatar);
      session.beatIndex += 1;
      render();
      await sleep(450);
    } else if (beat.type === "choice") {
      session.waiting = "choice";
      session.hint = beat.hint;
      session.options = beat.options;
      render();
      return;
    } else if (beat.type === "end") {
      progress.completed[story.id] = true;
      saveProgress(progress);
      session.waiting = "end";
      session.endBeat = beat;
      render();
      return;
    }
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

window.__pickOption = async function (index) {
  const story = currentStory();
  const beat = story.beats[session.beatIndex];
  const opt = beat.options[index];

  pushMsg("me", opt.replyText);
  session.waiting = null;
  session.options = [];
  render();
  await sleep(400);

  if (opt.good) {
    if (opt.thenText) {
      pushMsg(opt.thenFrom || "them", opt.thenText);
      render();
      await sleep(400);
    }
    session.beatIndex += 1;
    playForward();
  } else {
    pushMsg("guide", opt.tip);
    render();
    // stay on same choice beat so the child can try again
    session.waiting = "choice";
    session.hint = beat.hint;
    session.options = beat.options;
    render();
  }
};

window.__goHome = function () {
  session = null;
  bonus = null;
  route = { screen: "home" };
  render();
};

/* ---------- BONUS: TANTANGAN KILAT ---------- */
window.__openBonus = function () {
  bonus = {
    questions: shuffledBonusRound(8),
    index: 0,
    streak: 0,
    answered: false,
    lastCorrect: null
  };
  route = { screen: "bonus" };
  render();
};

function renderBonus() {
  if (!bonus || bonus.index >= bonus.questions.length) {
    if (bonus && bonus.streak > (progress.bestStreak || 0)) {
      progress.bestStreak = bonus.streak;
      saveProgress(progress);
    }
    app.innerHTML = `
      <div class="story-header" style="background:#D9A400">
        <button class="back" onclick="__goHome()">←</button>
        <div><div class="title">⚡ Tantangan Kilat</div><div class="sub">Ronde selesai</div></div>
      </div>
      <div class="end-wrap">
        <div class="end-sticker">🏁</div>
        <div class="end-title">Ronde Selesai!</div>
        <div class="end-recap">
          Skor beruntunmu di ronde ini: <b>${bonus ? bonus.streak : 0}</b> benar berturut-turut.<br/>
          Rekor terbaikmu: <b>${progress.bestStreak || 0}</b>
        </div>
        <button class="end-btn" onclick="__openBonus()">Main Lagi</button>
        <button class="end-btn" style="background:transparent;color:#3A7D44;border:2px solid #3A7D44" onclick="__goHome()">Kembali ke Rumah Stiker</button>
      </div>`;
    return;
  }

  const q = bonus.questions[bonus.index];
  let feedbackHtml = "";
  if (bonus.answered) {
    feedbackHtml = `<div class="bubble-row guide"><span class="avatar">🦉</span><div class="bubble">${bonus.lastCorrect ? "✅ Betul! " : "❌ Belum tepat. "}${q.tip}</div></div>`;
  }

  app.innerHTML = `
    <div class="story-header" style="background:#D9A400">
      <button class="back" onclick="__goHome()">←</button>
      <div><div class="title">⚡ Tantangan Kilat</div><div class="sub">Soal ${bonus.index + 1} dari ${bonus.questions.length} • 🔥 Beruntun: ${bonus.streak}</div></div>
    </div>
    <div class="chat-log">
      <div class="bubble-row guide"><span class="avatar">🦉</span><div class="bubble">${q.text}</div></div>
      ${feedbackHtml}
    </div>
    <div class="choice-panel">
      ${!bonus.answered ? `
        <div class="choice-hint">Boleh atau tidak?</div>
        <button class="choice-btn" onclick="__answerBonus(true)"><span class="emo">😊</span><span>Boleh</span></button>
        <button class="choice-btn" onclick="__answerBonus(false)"><span class="emo">🚫</span><span>Tidak boleh</span></button>
      ` : `
        <button class="end-btn" onclick="__nextBonus()">Lanjut ➡️</button>
      `}
    </div>`;
}

window.__answerBonus = function (answerYes) {
  const q = bonus.questions[bonus.index];
  const correct = answerYes === q.yes;
  bonus.answered = true;
  bonus.lastCorrect = correct;
  bonus.streak = correct ? bonus.streak + 1 : 0;
  render();
};

window.__nextBonus = function () {
  bonus.index += 1;
  bonus.answered = false;
  bonus.lastCorrect = null;
  render();
};

render();
</script>
</body>
</html>
